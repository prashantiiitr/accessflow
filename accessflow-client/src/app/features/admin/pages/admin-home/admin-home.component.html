<div class="admin-container">
  <div class="topbar">
    <h2>Admin Panel</h2>

    <button (click)="logout()">Logout</button>
  </div>

  <div class="form-card">
    <h3>
      {{
        editingUserId
          ? 'Update User'
          : 'Create User'
      }}
    </h3>

    <input
      type="text"
      [(ngModel)]="formData.name"
      placeholder="Name"
    />

    <input
      type="text"
      [(ngModel)]="formData.userId"
      placeholder="User ID"
      [disabled]="editingUserId"
    />

    <input
      *ngIf="!editingUserId"
      type="password"
      [(ngModel)]="formData.password"
      placeholder="Password"
    />

    <select [(ngModel)]="formData.role">
      <option>Admin</option>

      <option>General User</option>
    </select>

    <button (click)="submitForm()">
      {{
        editingUserId
          ? 'Update User'
          : 'Create User'
      }}
    </button>
  </div>

  <div *ngIf="loading">
    Loading users...
  </div>

  <table *ngIf="!loading">
    <thead>
      <tr>
        <th>Name</th>

        <th>User ID</th>

        <th>Role</th>

        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.name }}</td>

        <td>{{ user.userId }}</td>

        <td>{{ user.role }}</td>

        <td>
          <button
            (click)="editUser(user)"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            (click)="deleteUser(user._id)"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
